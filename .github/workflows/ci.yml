name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy src scripts tests

      - name: Pytest
        run: python -m pytest

      - name: Bandit
        run: python -m bandit -r src

      - name: pip-audit
        run: python -m pip_audit --skip-editable
